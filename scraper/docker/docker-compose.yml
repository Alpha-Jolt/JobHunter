version: '3.8'

services:
  scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../output:/app/output
      - ../logs:/app/logs
    environment:
      - LOG_LEVEL=DEBUG
      - DEV_MODE=true
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  admin_dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uvicorn", "admin_dashboard.app:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    volumes:
      - ../output:/app/output
      - ../logs:/app/logs
    depends_on:
      - redis

  data_collector:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uvicorn", "data_collector_ui.app:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"
    depends_on:
      - redis
